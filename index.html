<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>你该换工作，还是换活法？</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f4efe5;--bg2:#efe7d8;--card:#fffdf9;
  --accent:#bb8a5e;--accent-deep:#a06f44;--accent-soft:rgba(187,138,94,0.12);
  --text:#473d31;--text-soft:#5d5346;--muted:#9a917f;
  --border:rgba(71,61,49,0.09);--sel-bg:rgba(187,138,94,0.10);
}
html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(120% 60% at 50% 0%,rgba(187,138,94,0.07) 0%,transparent 55%),var(--bg);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;width:100%;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

/* COVER */
#pageCover{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:56px 32px;text-align:center}
.emblem{width:78px;height:78px;margin:0 auto 34px;position:relative;flex-shrink:0}
.emblem span{position:absolute;border-radius:50%;border:1px solid var(--accent)}
.emblem span:nth-child(1){inset:0;opacity:.28}
.emblem span:nth-child(2){inset:13px;opacity:.5}
.emblem span:nth-child(3){inset:26px;opacity:.75}
.emblem i{position:absolute;width:9px;height:9px;background:var(--accent);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.cover-cat{font-size:11px;letter-spacing:4px;color:var(--accent-deep);margin-bottom:20px;font-weight:500}
.cover-title{font-size:27px;font-weight:700;line-height:1.5;color:var(--text);margin-bottom:16px;word-break:keep-all;overflow-wrap:break-word}
.cover-sub{font-size:14px;color:var(--muted);line-height:1.9;margin-bottom:30px}
.cover-modules{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:46px}
.cover-mod{font-size:12px;color:var(--accent-deep);background:var(--accent-soft);border:1px solid var(--border);border-radius:100px;padding:6px 14px}
.btn-start{background:var(--accent);color:#fffdf9;border:none;border-radius:100px;padding:17px 58px;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 8px 22px rgba(187,138,94,.28);transition:transform .15s,box-shadow .2s}
.btn-start:active{transform:scale(.97);box-shadow:0 4px 12px rgba(187,138,94,.22)}
.cover-hint{font-size:12px;color:var(--muted);margin-top:20px;opacity:.75;letter-spacing:.3px}

/* QUESTION */
#pageQuestion{display:none;flex-direction:column;min-height:100vh}
.prog-track{height:3px;background:rgba(71,61,49,0.07)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent-deep),var(--accent));transition:width .45s cubic-bezier(.4,0,.2,1)}
.q-head{padding:34px 28px 0}
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.q-mod{font-size:11px;color:var(--accent-deep);background:var(--accent-soft);border-radius:100px;padding:4px 11px;letter-spacing:.5px;font-weight:500}
.q-num{font-size:12px;color:var(--muted);letter-spacing:2px;font-weight:500}
.q-text{font-size:20px;font-weight:600;line-height:1.6;color:var(--text);word-break:keep-all;overflow-wrap:break-word}
.opts{padding:26px 20px 36px;display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:18px;min-height:62px;cursor:pointer;box-shadow:0 2px 10px rgba(71,61,49,.03);transition:border-color .2s,background .2s,transform .15s;opacity:0;transform:translateY(10px)}
.opt.in{opacity:1;transform:translateY(0);transition:opacity .32s,transform .32s,border-color .2s,background .2s}
.opt.picked{background:var(--sel-bg);border-color:var(--accent)}
.opt:not(.picked):not([data-locked]):active{transform:scale(.985);border-color:rgba(187,138,94,.4)}
.badge{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(187,138,94,.35);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent-deep);flex-shrink:0;line-height:1;transition:background .2s,border-color .2s,color .2s}
.opt.picked .badge{background:var(--accent);border-color:var(--accent);color:#fffdf9}
.opt-body{font-size:15px;line-height:1.55;color:var(--text-soft);flex:1}

/* LOADING */
#pageLoading{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 36px;text-align:center}
.spinner{width:56px;height:56px;border:3px solid rgba(187,138,94,.18);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;margin-bottom:30px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-pct{font-size:38px;font-weight:700;color:var(--accent-deep);letter-spacing:1px;margin-bottom:14px;font-variant-numeric:tabular-nums}
.load-text{font-size:14px;color:var(--muted);line-height:1.9;min-height:26px;transition:opacity .3s}

/* RESULT */
#pageResult{display:none;flex-direction:column;min-height:100vh;opacity:0;transition:opacity .5s}
#pageResult.vis{opacity:1}
.res-top{padding:60px 28px 18px;text-align:center}
.res-pill{display:inline-block;font-size:11px;letter-spacing:3px;color:var(--accent-deep);background:var(--accent-soft);border-radius:100px;padding:6px 18px;margin-bottom:24px}
.res-type{font-size:31px;font-weight:700;color:var(--text);margin-bottom:14px;letter-spacing:.5px}
.res-tagline{font-size:15px;color:var(--text-soft);line-height:1.95;max-width:310px;margin:0 auto}
.kw-row{padding:18px 24px 4px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.kw{background:var(--accent-soft);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:13px;color:var(--accent-deep)}
.radar-wrap{display:flex;justify-content:center;padding:18px 20px 2px}
.axis-sum{margin:10px 20px 4px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 12px;display:flex}
.axis-item{flex:1;text-align:center;padding:0 6px}
.axis-item+.axis-item{border-left:1px solid var(--border)}
.axis-lab{font-size:12px;color:var(--muted);margin-bottom:7px;letter-spacing:.5px}
.axis-val{font-size:28px;font-weight:700;color:var(--accent-deep);font-variant-numeric:tabular-nums;line-height:1}
.axis-tag{font-size:11px;color:var(--muted);margin-top:6px}
.dist{margin:14px 20px 8px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px}
.dist-title{font-size:12px;color:var(--accent-deep);letter-spacing:1.5px;margin-bottom:16px}
.dist-row{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.dist-row:last-child{margin-bottom:0}
.dist-lab{font-size:12px;color:var(--muted);width:74px;flex-shrink:0}
.dist-bar{flex:1;height:8px;background:rgba(71,61,49,.06);border-radius:100px;overflow:hidden}
.dist-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-deep),var(--accent));border-radius:100px;width:0;transition:width .85s cubic-bezier(.4,0,.2,1)}
.dist-row.low .dist-lab{color:var(--accent-deep);font-weight:700}
.dist-num{font-size:12px;color:var(--muted);width:26px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.dist-note{font-size:11px;color:var(--muted);margin-top:14px;line-height:1.7;opacity:.85}
.divider{width:38px;height:1px;background:var(--accent);margin:28px auto 6px;opacity:.4}
.sections{padding:16px 20px 16px;display:flex;flex-direction:column;gap:13px}
.sec{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px 20px;box-shadow:0 2px 12px rgba(71,61,49,.03)}
.sec-title{font-size:13px;color:var(--accent-deep);letter-spacing:1px;margin-bottom:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:14px;height:2px;background:var(--accent);border-radius:2px}
.sec-text{font-size:15px;line-height:2;color:var(--text-soft);white-space:pre-wrap}
.sec:nth-child(3){border-left:2px solid rgba(187,138,94,.45)}
.sec:nth-child(7){background:rgba(187,138,94,.04);border-color:rgba(187,138,94,.15)}
.btn-again{display:block;margin:14px 20px 0;background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:100px;padding:15px;font-size:14px;cursor:pointer;text-align:center;letter-spacing:.5px;width:calc(100% - 40px)}
.btn-again:active{border-color:var(--accent);color:var(--accent-deep)}
.foot{text-align:center;font-size:11px;color:var(--muted);opacity:.6;padding:24px 22px;line-height:1.8}
.spacer{height:30px}
</style>
</head>
<body>
<div id="app">
  <div id="pageCover">
    <div class="emblem"><span></span><span></span><span></span><i></i></div>
    <div class="cover-cat" id="coverCat"></div>
    <h1 class="cover-title" id="coverTitle"></h1>
    <p class="cover-sub" id="coverSub"></p>
    <div class="cover-modules" id="coverModules"></div>
    <button class="btn-start" onclick="startTest()">开始测试</button>
    <p class="cover-hint" id="coverHint"></p>
  </div>

  <div id="pageQuestion">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="q-head">
      <div class="q-meta"><span class="q-mod" id="qMod"></span><span class="q-num" id="qNum"></span></div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="opts" id="opts"></div>
  </div>

  <div id="pageLoading">
    <div class="spinner"></div>
    <div class="load-pct" id="loadPct">0%</div>
    <div class="load-text" id="loadText"></div>
  </div>

  <div id="pageResult">
    <div class="res-top">
      <div class="res-pill">你的职业状态诊断报告</div>
      <div class="res-type" id="resType"></div>
      <div class="res-tagline" id="resTagline"></div>
    </div>
    <div class="kw-row" id="kwRow"></div>
    <div class="radar-wrap" id="radarWrap"></div>
    <div class="axis-sum" id="axisSum"></div>
    <div class="dist">
      <div class="dist-title">四个维度得分（分越高越健康）</div>
      <div id="distRows"></div>
      <div class="dist-note" id="distNote"></div>
    </div>
    <div class="divider"></div>
    <div class="sections" id="sections"></div>
    <button class="btn-again" onclick="restart()">↺ 重新测试</button>
    <div class="foot">本测试参考马氏倦怠量表(MBI)、工作-人匹配模型与自我决定理论设计，用于自我觉察参考，不构成医学或心理诊断。若你长期情绪低落、影响睡眠与生活，请寻求专业心理帮助。</div>
    <div class="spacer"></div>
  </div>
</div>
<script>
// ====================================================================
//  配置区
//  4个维度，每维8题；每题4个选项，按健康→不健康排序：A=3分 B=2分 C=1分 D=0分
//  维度0/1=工作轴，维度2/3=自我轴；按两轴高低诊断"换工作/换活法/重建/优化"
// ====================================================================
const DIMS = ["工作耗竭","价值匹配","心理能量","生活根基"];
const CONFIG = {
  meta: {
    category: "职业状态深度诊断",
    title: "你该换工作，\n还是换活法？",
    subtitle: "32道题 · 4大维度，看清你累的到底是工作，还是你自己",
    modules: ["工作耗竭","价值匹配","心理能量","生活根基"],
    hint: "约5分钟 · 32题 · 结果仅供自我觉察",
    loadingTexts: ["正在汇总你的 32 个选择…","正在比对工作轴与自我轴…","正在定位你的真实病根…","正在生成你的专属报告…"]
  },
  modules: [
    { name:"工作耗竭", questions:[
      { text:"现在的工作，对你情绪和精力的消耗是？", opts:[
        "基本不影响，下班能恢复过来","偶尔会累，但休息一下能缓过来","经常感到疲惫，休息也不太够用","长期被掏空，怎么休息都缓不过来"]},
      { text:"周一早上想到要上班，你的心情通常是？", opts:[
        "还算平静，没什么特别抗拒","有点不情愿，但很快能调整","比较沉重，要靠意志力推自己","极度抗拒，只想逃避不去面对"]},
      { text:"工作中遇到压力或难题时，你现在的反应是？", opts:[
        "还能积极应对，想办法解决","会有些烦躁，但还撑得住","常感力不从心，只想躲开","麻木了，已经懒得有任何反应"]},
      { text:"对待手头的工作，你的投入状态是？", opts:[
        "该认真时还能认真投入","表面正常，内心偶尔懈怠","越来越难投入，能少做就少做","完全应付，做多做少都无所谓"]},
      { text:"下班之后，你还会被工作的事缠住吗？", opts:[
        "基本不会，能切换到生活状态","偶尔会想，但不太影响心情","经常放不下，脑子还在紧绷","一直被工作焦虑笼罩，停不下来"]},
      { text:"对同事、客户或工作关系的感受是？", opts:[
        "整体还融洽，有正常往来","一般，谈不上好也谈不上累","有些应付不来，维持关系很耗","很抵触，一想到打交道就烦"]},
      { text:"最近，你对工作的热情和心气儿是？", opts:[
        "还保留着一些，偶有干劲","平淡，但没有特别消极","明显在往下掉，提不起劲","已经熄灭了，只剩疲惫和冷漠"]},
      { text:"用一个状态形容你和工作的关系，更接近？", opts:[
        "还在好好配合，节奏稳定","有点累，但还在正常运转","在硬撑，靠惯性往前推","濒临停摆，随时想撂挑子"]}
    ]},
    { name:"价值匹配", questions:[
      { text:"你的能力和当前工作的匹配程度？", opts:[
        "很匹配，能发挥我的所长","基本匹配，部分地方需提升","不太匹配，常感力不从心","完全不匹配，做着不擅长的事"]},
      { text:"这份工作能给你带来成就感吗？", opts:[
        "有，完成某些事会让我满足","偶尔有，但不算多","很少了，越来越难有","几乎没有，做完也没感觉"]},
      { text:"现在做的事，和你看重的价值观一致吗？", opts:[
        "比较一致，做着觉得有意义","大体还行，偶尔有点拧巴","不太一致，常觉得在违背自己","完全相悖，每天做不认同的事"]},
      { text:"在工作里，你有掌控感吗（能决定怎么做事）？", opts:[
        "有一定自主空间，能按自己方式来","部分能，部分要听安排","大多身不由己，被推着走","完全没有，像个被安排的工具"]},
      { text:"你的付出和回报（钱、认可、成长）匹配吗？", opts:[
        "基本匹配，对得起我的付出","还行，偶尔觉得不太够","不太匹配，付出常被辜负","严重失衡，越干越觉得不值"]},
      { text:"想到这份工作的未来发展，你？", opts:[
        "有盼头，能看到成长空间","一般，说不上好也说不上差","比较灰心，感觉看不到头","绝望，留下只会越来越糟"]},
      { text:"你上一次因为工作真正感到骄傲，是？", opts:[
        "最近就有，几件事做得不错","有过，但要回想一下","已经是挺久之前的事了","真的想不起来了"]},
      { text:"总的来说，这份工作「适不适合你」？", opts:[
        "比较适合，待着还算舒展","凑合适合，没到难受的地步","不太适合，常觉得被困住","完全不适合，每天都在勉强自己"]}
    ]},
    { name:"心理能量", questions:[
      { text:"抛开工作不谈，你最近整体的精力和兴致？", opts:[
        "比较充沛，对生活还有兴致","一般，但还能正常运转","偏低，做什么都提不起劲","很差，长期感觉空荡荡的"]},
      { text:"早上醒来的那一刻，你通常？", opts:[
        "还算清醒，可以开始新的一天","要缓一会儿才能进入状态","醒来就觉得累，不想动","一睁眼就发怵，不想面对这天"]},
      { text:"你的睡眠和恢复效果如何？", opts:[
        "还好，睡了基本能恢复","偶尔睡不好，但大体可以","质量下降了，常常缓不过来","很差，睡了跟没睡一样"]},
      { text:"你最近的情绪状态？", opts:[
        "基本稳定，偶尔有起伏","有点低落，但还在可控范围","经常内耗，比较难自我调节","长期低迷，有时连原因都说不清"]},
      { text:"还有什么事能让你感到充实或开心吗？", opts:[
        "有，做某些事还是会觉得值","有一些，但比以前少了","很少了，越来越难找到","几乎没有，做什么都觉得在耗"]},
      { text:"面对想做的事，你能行动起来吗？", opts:[
        "基本能，想做就去做了","有时拖延，但最终能动","经常心有余而力不足","完全动不了，连开始都没力气"]},
      { text:"你上一次感觉「满血、有劲儿」是什么时候？", opts:[
        "最近就有","不久之前，想一下能记起","已经挺久了","久到想不起那种感觉了"]},
      { text:"如果用手机电量形容现在的你？", opts:[
        "60%以上，还能正常运转","30%~50%，有点低但撑得住","不到20%，靠意志硬撑","红灯了，随时可能关机"]}
    ]},
    { name:"生活根基", questions:[
      { text:"除了工作，你的生活（关系、爱好、自我时间）是？", opts:[
        "比较充实，有支撑我的人和事","还过得去，但不够丰富","比较单薄，几乎被工作占满","几乎空白，工作之外什么都没有"]},
      { text:"你有可以说心里话、给你支持的人吗？", opts:[
        "有，关系让我感到被支撑","有一两个，但联系不算多","很少，大多事只能自己扛","几乎没有，感觉很孤独"]},
      { text:"你每天有「属于自己」的时间吗？", opts:[
        "有，能留点空间给自己","有一些，但常常不够","很少，几乎全被占满","完全没有，连喘口气都难"]},
      { text:"你对现在的生活状态，满意吗？", opts:[
        "基本满意，虽有想改善的地方","不太满意，但还在努力调整","不满意，又不知道怎么改","很不满意，且越来越觉得无力"]},
      { text:"你照顾自己的生活节律吗（吃饭、运动、休息）？", opts:[
        "基本规律，照顾得还可以","有些失调，但没大问题","明显变差，很多习惯丢了","很乱，整个人状态都在下滑"]},
      { text:"想到未来的生活，你的感觉是？", opts:[
        "有期待，相信会越来越好","有点迷茫，但还有信心","比较担心，感觉前路不明","很沉重，甚至有点害怕去想"]},
      { text:"你和「自己喜欢的那个自己」之间？", opts:[
        "还比较接近，活得像我自己","有点距离，但还认得出","离得有点远，常觉得不像我了","几乎陌生，不知道自己成了谁"]},
      { text:"用一句话形容你工作之外的生活？", opts:[
        "有滋味，能喘得过气","平淡，但还稳得住","被掏空，只剩疲惫","一片空白，像没在生活"]}
    ]}
  ],
  // results[0]平稳 [1]换工作 [2]换活法 [3]双重耗竭
  results: [
    { type:"状态平稳型",
      tagline:"你整体还在轨道上，眼下更像是「要不要往前再走一步」的选择",
      keywords:["基本稳定","有余力","待突破"],
      sections:[
        {title:"你的状态总览", text:"从四个维度的得分来看，你现在的状态比大多数人都稳。工作没有把你榨干，你和它的关系还算合得来；更重要的是，工作之外，你的心理能量和生活根基都还在。\n\n你不是在硬撑，也不是在逃。这意味着你面对的不是「危机」，而是一道选择题：守着这份还不错的稳定，还是主动往前，去够那个你心里知道自己可以要的东西。"},
        {title:"核心结论：你既不用换工作，也不用换活法", text:"你需要的，是换一个更高的目标。\n\n你的根基足够好，足以支撑你去冒一点险、试一点新。现在真正的风险不是行动，而是因为「现在还行」，把想做的事一直往后拖——几年后回头，发现自己还停在原地，只是老了几岁。\n\n「够了」是稳定区最危险的谎言。"},
        {title:"深度分析", text:"心理学有个概念叫「舒适区悖论」：处于安全边缘的人，改变的动力总不够紧迫，但停留的代价是缓慢的停滞。你不是缺乏能力，是缺乏一个足够有吸引力的目标，来激活你本已具备的潜力。\n\n稳定型最容易陷入的，不是痛苦，而是温水——过得不差，所以改变的理由总不够充分；但心里清楚，自己其实可以要更多。这种「我本可以」的声音，平时被日常淹没，深夜里却会冒出来。\n\n它不是矫情，是你的潜力在提醒你：别浪费。"},
        {title:"你的能量正在流向哪里", text:"你的能量没有大量在漏，这是你最大的本钱。但要留意一种隐性消耗：「维持现状」本身也是要花力气的。\n\n当一个人长期待在舒适区边缘，会下意识用忙碌填满自己，好让自己看起来很努力，从而回避「我到底想要什么」这个更难的问题。这种回避越久，启动越难——因为停留的时间会慢慢变成「已经这样了」的理由。"},
        {title:"你内心真正渴望的", text:"你渴望的不是更安稳，而是投入感和成长感——那种全身心扑在一件值得的事上、并看着自己变强的感觉。\n\n自我决定理论里，这对应的是「胜任感」和「自我实现」：你不缺安全感，你缺的是一个值得你认真对待的目标——一个让你愿意为它不舒服、超出现在的自己的事。"},
        {title:"未来走势", text:"如果维持现状，你大概率不会变差，但也不会真正变好。「还行」会慢慢磨成「将就」，然后某天你会突然发现，已经好多年没有做过一件让自己真正兴奋的事了。\n\n如果你愿意主动往前走一步——给自己设一个够得着但有挑战的目标——你很可能在半年内进入一个完全不同的状态。因为你本来就有底子，缺的只是一个真正的起点。"},
        {title:"未来30天行动地图", text:"「心流」研究告诉我们：人在能力和挑战都被充分调动时，才会感受到真正的投入和意义感。这30天，就是找到那个点在哪里。\n\n第1周｜诚实问自己一个问题\n如果不怕失败、不顾别人看法，我最想做的3件事是什么？只凭感觉，不管现实可行性。先把真实答案找出来。\n\n第2周｜做一次最小的尝试\n从那3件事里挑一件，做一个最小的行动——不是「做成」，是「开始」。起步比方向更重要，你可以在行动中调整，但在原地等不来清晰。\n\n第3周｜把你的某项擅长，用在新的地方\n把你现有的一项能力，主动放在一件新事情上，体验「原来我还可以做这个」的感觉。这是在扩大你的可能性地图。\n\n第4周｜给半年后的自己写封信\n写下：「我希望那时候，我已经开始做了什么。」写完，发给自己，设个提醒，半年后打开。"},

        {title:"核心结论：你该认真考虑换工作", text:"对你来说，「换工作」是一个值得认真考虑的方向，而不是逃避。\n\n你的疲惫来自工作和你的不匹配——能力用不上、价值观拧着、付出不被回报。而这类问题，换一个更合适的环境，是真的能解决的。你不是哪里都待不下去的人，你只是这次待错了地方。\n\n趁你自己还完整，是行动的最好时机。"},
        {title:"深度分析", text:"职业心理学把你这种状态叫「工作-人匹配失调」。\n\n马氏倦怠量表的作者克里斯蒂娜·马斯拉奇在研究中发现，职业倦怠的根源往往不是「你不够好」，而是人与工作在六个维度上的错配：工作量、掌控感、回报、公平感、团队关系、价值观。你在这份工作里的倦怠，很可能来自其中几个错配——而不是你的能力或品格有问题。\n\n关键在于：错配是情境性的，它不跟着你走。换到一个更匹配的环境，同样的你，会焕然不同。\n\n这不是在给自己找借口，这是在用心理学事实给自己一个准确的诊断。"},
        {title:"你的能量正在流向哪里", text:"你的能量，主要在「对抗错配」这件事上漏掉。\n\n每天去适应一个本就不适合你的环境，消化「付出不被认可」的委屈，在不认同的事情上维持投入——这些都是纯粹的内耗，没有任何积累和产出。\n\n好消息是：这部分消耗是环境性的。一旦离开错配的环境，这些能量会很快回来。"},
        {title:"你内心真正渴望的", text:"你渴望的是「被放对位置」——能发挥所长（胜任感），能自己说了算一些事（自主感），付出能得到公平的回报。\n\n这些不是过分的要求，是自我决定理论里人在工作中最基本的心理需要。你现在的难受，本质是这几种需要长期得不到满足，积累成了倦怠。\n\n你不是要求太高，你只是在错的地方待太久了。"},
        {title:"未来走势", text:"如果继续待在错配里，你现在还好的部分——心理能量和生活根基——会被慢慢拖下水，最终演变成双重耗竭，那才是真正难翻身的状态。\n\n如果你趁现在还完整，认真评估并寻找更匹配的方向，恢复会比你想象的快得多。人在匹配的环境里，连同样的压力都会变得可承受——因为那个压力是在你认同的事情上产生的。"},
        {title:"未来30天行动地图", text:"重要前提：不要冲动裸辞，但也不要在错配里继续硬耗。「边工作边准备」才是正确姿势。\n\n第1周｜看清问题的真实根源\n列出这份工作里最消耗你的3件事，认真区分：「这是工作的问题」还是「这是我的问题」。清晰的诊断，比仓促的行动更值钱。\n\n第2周｜定义「什么样的工作适合你」\n写下你理想工作的3个硬条件：能发挥什么能力、认同什么价值观、需要什么回报形式。不写这个，换了工作也不知道往哪里找。\n\n第3周｜低调收集信息，不打草惊蛇\n在不辞职的前提下，了解1-2个你认为更匹配的方向或岗位。目标是「信息」，不是「决定」。\n\n第4周｜和一个在目标领域的人聊一次\n找一个已经在你向往方向里的人，听听他们的真实感受，验证你的判断。一手信息比所有分析都管用。"},

        {title:"核心结论：与其换工作，不如换活法", text:"你现在可能有一个强烈的冲动：「换份工作，一切会不一样。」但数据告诉你：这份工作本身对你的消耗，并不是主要问题。\n\n职场心理学里有个现象叫「跳槽后综合征」：内在枯竭的人换了工作，新鲜感在三个月内消退，然后发现自己带着同样的空洞到了新地方。因为问题不在那份工作，问题是随身携带的。\n\n真正需要改变的，是你怎么生活、怎么对待自己。"},
        {title:"深度分析", text:"自我决定理论把人的心理需要归纳为三个：自主感（能按自己的方式活）、胜任感（做自己擅长的事）、归属感（被真正看见和接纳）。\n\n你的困境不是因为工作太差，而是这三样东西在你的整个生活里都严重不足——工作把所有时间和空间占满了，自我已经被挤没了。你不是讨厌那份工作，你是在那份工作里彻底失去了自己。\n\n这是一个「生活结构」的问题，不是「哪份工作」的问题。换了工作，这个结构不改，还是一样的结果。"},

        {title:"未来30天行动地图", text:"自我决定理论告诉我们：当三个基本心理需要得到满足，人的活力和动力会自然恢复。这30天，就是一步步把这三样找回来。\n\n第1周｜找回自主感：每天有30分钟「只属于自己」\n不管再忙，每天给自己留30分钟，做任何你自己想做的事（不是「应该做」的）。自主感，从「你能选择」这件事开始恢复。\n\n第2周｜找回胜任感：重新捡起一件你擅长、喜欢的事\n不管它有没有用，不管和工作有没有关系。胜任感来自「我在做我会的、我喜欢的事」——这是能量回充的直接来源。\n\n第3周｜找回归属感：联系一个让你做回自己的人\n打电话、发消息、约出来坐坐都行。不是聊工作，是真正地放松交流。被真正看见，是人恢复状态最快的方式之一。\n\n第4周｜带着新状态，再来评估工作\n经过三周的补给，你对工作的感受会有变化。那时候再想「换不换」，你的判断会更清醒、更准确。"},

        {title:"核心结论：先别做任何重大决定", text:"现在最重要的事，不是弄清楚「换不换工作」，而是先停下来，别在这个状态下做任何重大决定。\n\n原因很直接：当系统长期过载，判断力是失真的。疲惫会伪装成理性，让你在没有力气的时候做出看似果断、实则草率的选择——冲动裸辞，或者强迫自己振作，结果往往更糟。\n\n你需要的不是更大的勇气，而是一段喘息的空间。等你有了一点力气，答案会自己变清晰。"},

        {title:"你的能量正在流向哪里", text:"你的能量在三个口子同时漏出去：\n\n一是对抗错配的消耗——每天用力气去适应不适合自己的处境，去消化「付出不被看见」的委屈。这部分是纯粹的内耗，没有任何产出。\n\n二是维持表面正常的代价——压抑难受、继续撑着，这本身就需要大量能量。你可能以为自己「还好」，但维持「还好」的样子，每天都在吃老本。\n\n三是生活的空场——你工作之外几乎没有什么在给你充电。人需要「进项」才能持续「支出」，而你现在只有出没有进，当然越来越空。"},
        {title:"你内心真正渴望的", text:"在这一切之下，你内心最深处的渴望其实很朴素：「我只想找回那个还不错的自己。」\n\n你记得自己曾经有过力气，有过热情，有过对某些事真的感兴趣。自我决定理论告诉我们，人有三个基本心理需要：自主（能按自己的方式活）、胜任（做自己擅长的事）、归属（被真正看见）。这三样东西，你已经很久没好好拥有过了。\n\n你不需要一个宏大的计划。你需要的是先被允许停下来——哪怕片刻，对自己说一声：「你已经很久没歇了。」"},

        {title:"未来30天行动地图", text:"行为激活疗法的核心发现：情绪跟随行为，不是行为跟随情绪。不要等「有感觉了」再行动，用行动去生成感觉。\n\n第1周｜先稳住身体节律\n每天固定一个起床时间，不管状态多差都坚守。\n原理：昼夜节律是皮质醇调节的基础——作息飘忽会让压力系统更乱。\n禁止：早晨不做任何「判断人生」的事。\n\n第2周｜从五分钟的行为激活开始\n找一件以前喜欢、但已经很久没做的事，只做五分钟。\n原理：不管有没有感觉，先做。大脑的奖励回路是被行为激活的，不是被意志力激活的。\n\n第3周｜在一件小事上找回掌控感\n在任何一个领域找回「我做了→有结果」的感觉。照顾一盆植物、做一道菜、整理一个抽屉都可以。\n原理：掌控感是跨领域迁移的，小事上找回的感觉会慢慢渗透到更大的领域。\n\n第4周｜开始问真正的问题\n到这一步，你才有能量去想「换工作还是换活法」。带着纸笔，写下：「我真正不能放弃的是什么？」不是「应该」，是「真的不能放弃」。这才是你下一步决定的基础。"},

document.getElementById('coverHint').textContent = CONFIG.meta.hint;
document.getElementById('coverModules').innerHTML = CONFIG.meta.modules.map(m=>`<span class="cover-mod">${m}</span>`).join('');
document.title = CONFIG.meta.title.replace(/\n/g,'');

function show(id){
  ['pageCover','pageQuestion','pageLoading','pageResult'].forEach(p=>document.getElementById(p).style.display='none');
  const el=document.getElementById(id); el.style.display='flex'; el.style.flexDirection='column';
}
function startTest(){ cur=0; dimRaw=[0,0,0,0]; show('pageQuestion'); renderQ(); }

function renderQ(){
  const q=FLAT[cur];
  document.getElementById('progFill').style.width=(cur/TOTAL*100)+'%';
  document.getElementById('qMod').textContent=q.module;
  document.getElementById('qNum').textContent=String(cur+1).padStart(2,'0')+' / '+String(TOTAL).padStart(2,'0');
  const qEl=document.getElementById('qText'), optsEl=document.getElementById('opts');
  qEl.style.opacity='0'; optsEl.style.opacity='0';
  window.scrollTo({top:0,behavior:'auto'});
  setTimeout(()=>{
    qEl.textContent=q.text; qEl.style.transition='opacity .3s'; qEl.style.opacity='1';
    optsEl.innerHTML=''; optsEl.style.opacity='1';
    q.opts.forEach((text,i)=>{
      const d=document.createElement('div'); d.className='opt';
      d.innerHTML=`<div class="badge">${LABELS[i]}</div><div class="opt-body">${text}</div>`;
      d.addEventListener('click',()=>pick(d,i));
      optsEl.appendChild(d);
      setTimeout(()=>d.classList.add('in'),50+i*65);
    });
  },160);
}
function pick(el,idx){
  document.querySelectorAll('.opt').forEach(o=>{o.style.pointerEvents='none';o.dataset.locked='1';});
  el.classList.add('picked');
  dimRaw[FLAT[cur].dim]+=(3-idx); // A=3 … D=0
  setTimeout(()=>{ cur++; if(cur<TOTAL) renderQ(); else runLoading(); },440);
}
function runLoading(){
  document.getElementById('progFill').style.width='100%';
  show('pageLoading');
  const pctEl=document.getElementById('loadPct'), txtEl=document.getElementById('loadText');
  const texts=CONFIG.meta.loadingTexts; const DURATION=2600; const start=performance.now(); let ti=0;
  txtEl.textContent=texts[0];
  const textTimer=setInterval(()=>{ti=(ti+1)%texts.length;txtEl.style.opacity='0';setTimeout(()=>{txtEl.textContent=texts[ti];txtEl.style.opacity='1';},200);},700);
  function tick(now){ const p=Math.min(1,(now-start)/DURATION); pctEl.textContent=Math.round(p*100)+'%'; if(p<1) requestAnimationFrame(tick); else {clearInterval(textTimer); showResult();} }
  requestAnimationFrame(tick);
}
function tagOf(v){ return v>=70?'良好':v>=55?'一般':v>=40?'偏低':'告急'; }

function renderRadar(d){ // d=[0..100]x4, 大=健康
  const S=280,c=S/2,R=80;
  const ang=[-Math.PI/2,0,Math.PI/2,Math.PI];
  let g='';
  [0.25,0.5,0.75,1].forEach(k=>{const p=ang.map(a=>`${(c+Math.cos(a)*R*k).toFixed(1)},${(c+Math.sin(a)*R*k).toFixed(1)}`).join(' ');g+=`<polygon points="${p}" fill="none" stroke="rgba(71,61,49,0.10)" stroke-width="1"/>`;});
  let ax=''; ang.forEach(a=>{ax+=`<line x1="${c}" y1="${c}" x2="${(c+Math.cos(a)*R).toFixed(1)}" y2="${(c+Math.sin(a)*R).toFixed(1)}" stroke="rgba(71,61,49,0.12)" stroke-width="1"/>`;});
  const pts=d.map((v,i)=>{const r=Math.max(4,v/100*R);return `${(c+Math.cos(ang[i])*r).toFixed(1)},${(c+Math.sin(ang[i])*r).toFixed(1)}`;}).join(' ');
  let dots=d.map((v,i)=>{const r=Math.max(4,v/100*R);return `<circle cx="${(c+Math.cos(ang[i])*r).toFixed(1)}" cy="${(c+Math.sin(ang[i])*r).toFixed(1)}" r="3.2" fill="#a06f44"/>`;}).join('');
  const lp=[[c,c-R-16],[c+R+6,c+4],[c,c+R+24],[c-R-6,c+4]];
  const an=['middle','start','middle','end'];
  let lb=''; DIMS.forEach((l,i)=>{lb+=`<text x="${lp[i][0]}" y="${lp[i][1]}" font-size="12.5" fill="#9a917f" text-anchor="${an[i]}">${l}</text>`;});
  return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}">${g}${ax}<polygon points="${pts}" fill="rgba(187,138,94,0.22)" stroke="#bb8a5e" stroke-width="2"/>${dots}${lb}</svg>`;
}

function showResult(){
  const dimScore=dimRaw.map(r=>Math.round(r/DIM_MAX*100));
  const workAxis=Math.round((dimScore[0]+dimScore[1])/2);
  const selfAxis=Math.round((dimScore[2]+dimScore[3])/2);
  const T=58; let win;
  if(workAxis>=T&&selfAxis>=T) win=0;
  else if(workAxis<T&&selfAxis>=T) win=1;
  else if(workAxis>=T&&selfAxis<T) win=2;
  else win=3;
  const result=CONFIG.results[win];

  document.getElementById('resType').textContent=result.type;
  document.getElementById('resTagline').textContent=result.tagline;
  document.getElementById('kwRow').innerHTML=result.keywords.map(k=>`<span class="kw">${k}</span>`).join('');
  document.getElementById('radarWrap').innerHTML=renderRadar(dimScore);
  document.getElementById('axisSum').innerHTML=
    `<div class="axis-item"><div class="axis-lab">工作状态</div><div class="axis-val">${workAxis}</div><div class="axis-tag">${tagOf(workAxis)}</div></div>`+
    `<div class="axis-item"><div class="axis-lab">自我状态</div><div class="axis-val">${selfAxis}</div><div class="axis-tag">${tagOf(selfAxis)}</div></div>`;

  const minS=Math.min(...dimScore);
  document.getElementById('distRows').innerHTML=dimScore.map((s,i)=>
    `<div class="dist-row ${s===minS?'low':''}"><div class="dist-lab">${DIMS[i]}</div><div class="dist-bar"><i data-w="${s}"></i></div><div class="dist-num">${s}</div></div>`).join('');
  document.getElementById('distNote').textContent='标橙色的是你当前最弱的维度，也是最值得先照顾的地方。';

  document.getElementById('sections').innerHTML=result.sections.map(s=>
    `<div class="sec"><div class="sec-title">${s.title}</div><div class="sec-text">${s.text}</div></div>`).join('');

  show('pageResult');
  window.scrollTo({top:0,behavior:'auto'});
  requestAnimationFrame(()=>setTimeout(()=>{
    document.getElementById('pageResult').classList.add('vis');
    document.querySelectorAll('.dist-bar i').forEach(b=>b.style.width=b.dataset.w+'%');
  },40));
}
function restart(){ document.getElementById('pageResult').classList.remove('vis'); show('pageCover'); window.scrollTo({top:0,behavior:'auto'}); }
</script>
</body>

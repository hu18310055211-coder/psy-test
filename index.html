<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>心理测试</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f4efe5;
  --bg2:#efe7d8;
  --card:#fffdf9;
  --accent:#bb8a5e;
  --accent-deep:#a06f44;
  --accent-soft:rgba(187,138,94,0.12);
  --text:#473d31;
  --text-soft:#5d5346;
  --muted:#9a917f;
  --border:rgba(71,61,49,0.09);
  --sel-bg:rgba(187,138,94,0.10);
}
html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(120% 60% at 50% 0%,rgba(187,138,94,0.07) 0%,transparent 55%),var(--bg);pointer-events:none;z-index:0}

#app{position:relative;z-index:1;width:100%;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

/* ── COVER ── */
#pageCover{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:56px 32px;text-align:center}
.emblem{width:78px;height:78px;margin:0 auto 34px;position:relative;flex-shrink:0}
.emblem span{position:absolute;border-radius:50%;border:1px solid var(--accent);opacity:.5}
.emblem span:nth-child(1){inset:0;opacity:.28}
.emblem span:nth-child(2){inset:13px;opacity:.5}
.emblem span:nth-child(3){inset:26px;opacity:.75}
.emblem i{position:absolute;width:9px;height:9px;background:var(--accent);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.cover-cat{font-size:11px;letter-spacing:4px;color:var(--accent-deep);margin-bottom:20px;font-weight:500}
.cover-title{font-size:26px;font-weight:700;line-height:1.5;color:var(--text);margin-bottom:16px;word-break:keep-all;overflow-wrap:break-word}
.cover-sub{font-size:14px;color:var(--muted);line-height:1.9;margin-bottom:30px}
.cover-modules{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:46px}
.cover-mod{font-size:12px;color:var(--accent-deep);background:var(--accent-soft);border:1px solid var(--border);border-radius:100px;padding:6px 14px}
.btn-start{background:var(--accent);color:#fffdf9;border:none;border-radius:100px;padding:17px 58px;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 8px 22px rgba(187,138,94,.28);transition:transform .15s,box-shadow .2s}
.btn-start:active{transform:scale(.97);box-shadow:0 4px 12px rgba(187,138,94,.22)}
.cover-hint{font-size:12px;color:var(--muted);margin-top:20px;opacity:.75;letter-spacing:.3px}

/* ── QUESTION ── */
#pageQuestion{display:none;flex-direction:column;min-height:100vh}
.prog-track{height:3px;background:rgba(71,61,49,0.07)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent-deep),var(--accent));transition:width .45s cubic-bezier(.4,0,.2,1)}
.q-head{padding:34px 28px 0}
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.q-mod{font-size:11px;color:var(--accent-deep);background:var(--accent-soft);border-radius:100px;padding:4px 11px;letter-spacing:.5px;font-weight:500}
.q-num{font-size:12px;color:var(--muted);letter-spacing:2px;font-weight:500}
.q-text{font-size:20px;font-weight:600;line-height:1.6;color:var(--text);word-break:keep-all;overflow-wrap:break-word;transition:opacity .25s}
.opts{padding:26px 20px 36px;display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:18px;min-height:62px;cursor:pointer;box-shadow:0 2px 10px rgba(71,61,49,.03);transition:border-color .2s,background .2s,transform .15s;opacity:0;transform:translateY(10px)}
.opt.in{opacity:1;transform:translateY(0);transition:opacity .32s,transform .32s,border-color .2s,background .2s}
.opt.picked{background:var(--sel-bg);border-color:var(--accent)}
.opt:not(.picked):not([data-locked]):active{transform:scale(.985);border-color:rgba(187,138,94,.4)}
.badge{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(187,138,94,.35);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent-deep);flex-shrink:0;line-height:1;transition:background .2s,border-color .2s,color .2s}
.opt.picked .badge{background:var(--accent);border-color:var(--accent);color:#fffdf9}
.opt-body{font-size:15px;line-height:1.55;color:var(--text-soft);flex:1}

/* ── LOADING ── */
#pageLoading{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 36px;text-align:center}
.spinner{width:56px;height:56px;border:3px solid rgba(187,138,94,.18);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;margin-bottom:30px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-pct{font-size:38px;font-weight:700;color:var(--accent-deep);letter-spacing:1px;margin-bottom:14px;font-variant-numeric:tabular-nums}
.load-text{font-size:14px;color:var(--muted);line-height:1.9;min-height:26px;transition:opacity .3s}

/* ── RESULT ── */
#pageResult{display:none;flex-direction:column;min-height:100vh;opacity:0;transition:opacity .5s}
#pageResult.vis{opacity:1}
.res-top{padding:62px 28px 30px;text-align:center}
.res-pill{display:inline-block;font-size:11px;letter-spacing:3px;color:var(--accent-deep);background:var(--accent-soft);border-radius:100px;padding:6px 18px;margin-bottom:26px}
.res-type{font-size:32px;font-weight:700;color:var(--text);margin-bottom:14px;letter-spacing:.5px}
.res-tagline{font-size:15px;color:var(--text-soft);line-height:1.95;max-width:300px;margin:0 auto}
.kw-row{padding:24px 24px 6px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.kw{background:var(--accent-soft);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:13px;color:var(--accent-deep)}
/* distribution */
.dist{margin:22px 20px 8px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px}
.dist-title{font-size:12px;color:var(--accent-deep);letter-spacing:1.5px;margin-bottom:16px}
.dist-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.dist-row:last-child{margin-bottom:0}
.dist-lab{font-size:12px;color:var(--muted);width:84px;flex-shrink:0}
.dist-bar{flex:1;height:8px;background:rgba(71,61,49,.06);border-radius:100px;overflow:hidden}
.dist-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-deep),var(--accent));border-radius:100px;width:0;transition:width .8s cubic-bezier(.4,0,.2,1)}
.dist-row.win .dist-lab{color:var(--accent-deep);font-weight:700}
.dist-num{font-size:12px;color:var(--muted);width:22px;text-align:right;flex-shrink:0}
.divider{width:38px;height:1px;background:var(--accent);margin:30px auto 6px;opacity:.4}
.sections{padding:18px 20px 16px;display:flex;flex-direction:column;gap:13px}
.sec{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px 20px;box-shadow:0 2px 12px rgba(71,61,49,.03)}
.sec-title{font-size:13px;color:var(--accent-deep);letter-spacing:1px;margin-bottom:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:14px;height:2px;background:var(--accent);border-radius:2px}
.sec-text{font-size:15px;line-height:2;color:var(--text-soft);white-space:pre-wrap}
.btn-again{display:block;margin:14px 20px 0;background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:100px;padding:15px;font-size:14px;cursor:pointer;text-align:center;letter-spacing:.5px;width:calc(100% - 40px);transition:border-color .2s,color .2s}
.btn-again:active{border-color:var(--accent);color:var(--accent-deep)}
.foot{text-align:center;font-size:11px;color:var(--muted);opacity:.6;padding:24px 20px;line-height:1.8}
.spacer{height:30px}
</style>
</head>
<body>
<div id="app">

  <!-- COVER -->
  <div id="pageCover">
    <div class="emblem"><span></span><span></span><span></span><i></i></div>
    <div class="cover-cat" id="coverCat"></div>
    <h1 class="cover-title" id="coverTitle"></h1>
    <p class="cover-sub" id="coverSub"></p>
    <div class="cover-modules" id="coverModules"></div>
    <button class="btn-start" onclick="startTest()">开始测试</button>
    <p class="cover-hint" id="coverHint"></p>
  </div>

  <!-- QUESTION -->
  <div id="pageQuestion">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="q-head">
      <div class="q-meta">
        <span class="q-mod" id="qMod"></span>
        <span class="q-num" id="qNum"></span>
      </div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="opts" id="opts"></div>
  </div>

  <!-- LOADING -->
  <div id="pageLoading">
    <div class="spinner"></div>
    <div class="load-pct" id="loadPct">0%</div>
    <div class="load-text" id="loadText"></div>
  </div>

  <!-- RESULT -->
  <div id="pageResult">
    <div class="res-top">
      <div class="res-pill">你的人生状态报告</div>
      <div class="res-type" id="resType"></div>
      <div class="res-tagline" id="resTagline"></div>
    </div>
    <div class="kw-row" id="kwRow"></div>
    <div class="dist">
      <div class="dist-title">你的选择分布</div>
      <div id="distRows"></div>
    </div>
    <div class="divider"></div>
    <div class="sections" id="sections"></div>
    <button class="btn-again" onclick="restart()">↺ 重新测试</button>
    <div class="foot">本测试基于心理状态量表设计，结果仅供自我觉察参考，不构成医学或心理诊断。</div>
    <div class="spacer"></div>
  </div>

</div>
<script>
// ================================================================
//  ★ 配置区 — 只需替换这里，无需改下方任何代码 ★
//  计分规则：统计 A/B/C/D 各被选了多少次，最多的字母 → 对应结果
//  （所以每题的 A 都对应 results[0]，B→results[1]，依此类推）
// ================================================================
const CONFIG = {
  meta: {
    category: "深度人生状态测评",
    title: "你只是累了，\n还是迷路了？",
    subtitle: "32道题，照见你当下最真实的人生状态",
    modules: ["工作系统", "成长系统", "能量系统", "生活系统"],
    hint: "约5分钟 · 32题 · 结果仅供自我觉察",
    loadingTexts: ["正在分析你的 32 个选择…", "正在比对四大人生系统…", "正在生成你的专属报告…"]
  },

  // 4个模块，每模块8题；每题4个选项，顺序固定 A→倦怠 B→消耗 C→停滞 D→迷失
  modules: [
    { name: "工作系统", questions: [
      { text: "周一早上想到要上班，你心里最先冒出来的是？", opts: [
        "又要开始了，光是想想就没力气",
        "说不上抗拒，但有种被掏空的疲惫",
        "反正每天都一样，去不去都没差别",
        "我到底为什么在做这份工作" ] },
      { text: "工作中最让你疲惫的瞬间是？", opts: [
        "明明很累，还要装作很有干劲",
        "处理那些看不见、说不清的内耗",
        "重复着早就会的事，学不到新东西",
        "忙了一整天，却不知道意义在哪" ] },
      { text: "如果现在有人问「你喜欢你的工作吗」？", opts: [
        "喜不喜欢不重要，我已经累到没感觉",
        "不讨厌，但它在悄悄耗尽我",
        "谈不上喜欢，就是停在这里出不去",
        "我连自己想要什么都不知道" ] },
      { text: "下班之后，你对工作的状态是？", opts: [
        "一秒都不想再想，只想瘫着",
        "人下班了，脑子还在隐隐发紧",
        "想提升自己，却总是没动静",
        "不知道这样下去会通向哪里" ] },
      { text: "看到同事升职或跳槽成功，你的第一反应？", opts: [
        "羡慕都懒得羡慕了，太累了",
        "心里咯噔一下，又说不出哪里不是滋味",
        "同样的起点，我怎么还在原地",
        "他们至少知道要去哪，我不知道" ] },
      { text: "你现在对待工作的方式，更像？", opts: [
        "硬撑着完成，能少做就少做",
        "表面正常，内里一点点漏气",
        "守着熟悉的活，不敢也不想突破",
        "走一步看一步，没有方向" ] },
      { text: "一想到「未来五年还做这个」，你？", opts: [
        "光想到就觉得熬不下去",
        "一种说不清的窒息感慢慢压上来",
        "怕五年后我还是现在这个样子",
        "五年？我连下个月都看不清" ] },
      { text: "你最近一次为工作真正有成就感，是？", opts: [
        "记不清了，现在只剩疲惫",
        "有过，但很快就被消耗掉了",
        "太久没有了，好像卡住了",
        "就算完成了，也不知道为了什么" ] }
    ]},
    { name: "成长系统", questions: [
      { text: "提到「自我成长」，你现在的感觉是？", opts: [
        "累到没精力管成长这件事",
        "想成长，但能量总是不够用",
        "努力了很久，还是没什么变化",
        "不知道该往哪个方向成长" ] },
      { text: "你买过的课、立过的 flag，现在？", opts: [
        "没动力打开，躺着比什么都香",
        "开了头，被各种事消耗到放弃",
        "学了不少，却没真正用起来",
        "当初为什么买，我已经忘了" ] },
      { text: "回望过去一年，你觉得自己？", opts: [
        "累了一整年，没剩下什么",
        "一直在付出，却被悄悄耗空",
        "和去年比，几乎没有长进",
        "走了一年，却不知道走到了哪" ] },
      { text: "面对一个需要走出舒适区的机会，你？", opts: [
        "太累了，不想再给自己加负担",
        "心动，但一想到要耗费精力就退缩",
        "知道该上，却总迈不出那一步",
        "不确定这是不是我真正想要的" ] },
      { text: "「明明在努力，却看不到结果」这种感觉，你？", opts: [
        "有，努力到最后只剩疲惫",
        "有，付出都被无形地消耗掉了",
        "有，使了劲却一直原地踏步",
        "有，甚至怀疑这努力有没有意义" ] },
      { text: "别人问你「最近在忙什么提升自己」，你？", opts: [
        "提升？能不垮就不错了",
        "忙是忙，但都忙在内耗上",
        "好像在忙，又好像没进展",
        "我都不知道该提升什么" ] },
      { text: "对自己当下的能力状态，最真实的判断是？", opts: [
        "不是不行，是被耗到使不出来",
        "有能力，但一直在被悄悄掏空",
        "卡在一个瓶颈，上不去",
        "不知道自己的优势到底是什么" ] },
      { text: "给「现在的成长状态」打个比方，更像？", opts: [
        "一台快没电、硬撑着运转的机器",
        "一个底部有裂缝、慢慢漏水的杯子",
        "一辆挂着空挡、轰油门却不走的车",
        "一艘没有航向、随波漂着的船" ] }
    ]},
    { name: "能量系统", questions: [
      { text: "早上睁开眼的那一刻，你通常？", opts: [
        "还没起，就已经觉得累",
        "睡了一觉，却没补回多少",
        "又是重复的一天，提不起劲",
        "不太清楚今天为什么要起来" ] },
      { text: "你最近的「累」，更像哪一种？", opts: [
        "身体被榨干的那种累",
        "说不出哪里累，但就是缓不过来",
        "一种困在原地的、乏味的累",
        "一种找不到意义的、空荡的累" ] },
      { text: "周末或假期结束时，你？", opts: [
        "没休够，又要去硬扛了",
        "休息了，却没真正放松下来",
        "假期和平时没区别，照样空转",
        "不知道休息是为了更好地去哪" ] },
      { text: "一天结束、瘫下来的时候，你在想？", opts: [
        "终于熬过去了，太累了",
        "没做什么大事，怎么这么累",
        "这一天好像白过了",
        "这样的日子，到底是为了什么" ] },
      { text: "让你感到能量被偷走的，往往是？", opts: [
        "没完没了、必须硬扛的任务",
        "那些说不清的情绪和人际内耗",
        "日复一日、毫无新意的重复",
        "看不到尽头、找不到意义的迷茫" ] },
      { text: "你有多久没有发自内心地觉得「满血」了？", opts: [
        "很久了，一直在透支",
        "想不起来，能量一直在漏",
        "太久了，整个人像卡住了",
        "我甚至忘了那种感觉是什么样" ] },
      { text: "想做的事很多，但真要行动起来，你？", opts: [
        "累到根本提不起劲开始",
        "一动，就被各种琐事耗散",
        "想了又想，却始终原地不动",
        "不确定哪件才是真正值得做的" ] },
      { text: "如果能量是手机电量，你现在大概？", opts: [
        "红色低电量，靠意志硬撑",
        "边充边掉，怎么也充不满",
        "卡在一个数字，怎么都不动",
        "不知道电用在了哪，就是空了" ] }
    ]},
    { name: "生活系统", questions: [
      { text: "除了工作，你的生活现在是？", opts: [
        "累到没有生活，只剩瘫着",
        "看着正常，里面一点点被掏空",
        "一成不变，像复制粘贴的每一天",
        "不知道自己到底想过什么样的生活" ] },
      { text: "面对身边的人和关系，你常觉得？", opts: [
        "累到没力气经营任何关系",
        "维系关系本身就在消耗我",
        "关系停在那，没有也不会更近",
        "不确定谁才是真正重要的人" ] },
      { text: "夜深人静、一个人的时候，你？", opts: [
        "累到只想放空，什么都不想",
        "莫名的空，说不清在难受什么",
        "觉得日子卡住了，动不了",
        "会忽然不知道自己在为什么活" ] },
      { text: "对于「我想要的生活」，你？", opts: [
        "太累了，连想都不敢想",
        "想过，但被现实一点点磨没了",
        "有过，但一直停留在想象里",
        "说实话，我并不清楚那是什么" ] },
      { text: "你现在和「喜欢的自己」之间？", opts: [
        "被累成了自己最不喜欢的样子",
        "在不知不觉中离她越来越远",
        "卡在某个地方，变不成她",
        "我甚至不知道她长什么样" ] },
      { text: "用一个词形容当下的生活，你会选？", opts: [
        "硬撑",
        "漏气",
        "卡住",
        "飘着" ] },
      { text: "「日子在过，但人不在场」的感觉，你有吗？", opts: [
        "有，累到像行尸走肉",
        "有，整个人是空的",
        "有，每天都在重复同一天",
        "有，不知道自己被带去了哪" ] },
      { text: "如果明天可以重新选择，你最想改变的是？", opts: [
        "先让自己好好喘口气",
        "堵住那些一直在漏的消耗",
        "打破现在这个出不去的局",
        "先搞清楚我到底想要什么" ] }
    ]}
  ],

  // 结果：results[0]=A最多, [1]=B最多, [2]=C最多, [3]=D最多
  results: [
    {

// ================================================================
//  逻辑代码（替换配置无需修改以下内容）
// ================================================================
const LABELS = ['A','B','C','D'];

// 扁平化题库（保留模块名）
const FLAT = [];
CONFIG.modules.forEach(m => m.questions.forEach(q =>
  FLAT.push({ module: m.name, text: q.text, opts: q.opts })));
const TOTAL = FLAT.length;

let cur = 0, counts = [0,0,0,0];

// 初始化封面
document.getElementById('coverCat').textContent = CONFIG.meta.category;
document.getElementById('coverTitle').innerHTML = CONFIG.meta.title.replace(/\n/g,'<br>');
document.getElementById('coverSub').textContent = CONFIG.meta.subtitle;
document.getElementById('coverHint').textContent = CONFIG.meta.hint;
document.getElementById('coverModules').innerHTML =
  CONFIG.meta.modules.map(m => `<span class="cover-mod">${m}</span>`).join('');
document.title = CONFIG.meta.title.replace(/\n/g,'');

function show(id) {
  ['pageCover','pageQuestion','pageLoading','pageResult'].forEach(p => {
    document.getElementById(p).style.display = 'none';
  });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
}

function startTest() {
  cur = 0; counts = [0,0,0,0];
  show('pageQuestion');
  renderQ();
}

function renderQ() {
  const q = FLAT[cur];
  document.getElementById('progFill').style.width = (cur / TOTAL * 100) + '%';
  document.getElementById('qMod').textContent = q.module;
  document.getElementById('qNum').textContent =
    String(cur + 1).padStart(2,'0') + ' / ' + String(TOTAL).padStart(2,'0');

  const qEl = document.getElementById('qText');
  const optsEl = document.getElementById('opts');
  qEl.style.opacity = '0';
  optsEl.style.opacity = '0';

  // 切题时滚回顶部
  window.scrollTo({ top: 0, behavior: 'auto' });

  setTimeout(() => {
    qEl.textContent = q.text;
    qEl.style.transition = 'opacity .3s';
    qEl.style.opacity = '1';
    optsEl.innerHTML = '';
    optsEl.style.opacity = '1';

    q.opts.forEach((text, i) => {
      const d = document.createElement('div');
      d.className = 'opt';
      d.innerHTML = `<div class="badge">${LABELS[i]}</div><div class="opt-body">${text}</div>`;
      d.addEventListener('click', () => pick(d, i));
      optsEl.appendChild(d);
      setTimeout(() => d.classList.add('in'), 50 + i * 65);
    });
  }, 160);
}

function pick(el, idx) {
  document.querySelectorAll('.opt').forEach(o => {
    o.style.pointerEvents = 'none';
    o.dataset.locked = '1';
  });
  el.classList.add('picked');
  counts[idx]++;
  setTimeout(() => {
    cur++;
    if (cur < TOTAL) renderQ();
    else runLoading();
  }, 440);
}

function runLoading() {
  document.getElementById('progFill').style.width = '100%';
  show('pageLoading');
  const pctEl = document.getElementById('loadPct');
  const txtEl = document.getElementById('loadText');
  const texts = CONFIG.meta.loadingTexts;
  const DURATION = 2000;
  const start = performance.now();
  let ti = 0;
  txtEl.textContent = texts[0];

  // 文案轮播
  const textTimer = setInterval(() => {
    ti = (ti + 1) % texts.length;
    txtEl.style.opacity = '0';
    setTimeout(() => { txtEl.textContent = texts[ti]; txtEl.style.opacity = '1'; }, 200);
  }, 650);

  // 百分比递增
  function tick(now) {
    const p = Math.min(1, (now - start) / DURATION);
    pctEl.textContent = Math.round(p * 100) + '%';
    if (p < 1) requestAnimationFrame(tick);
    else { clearInterval(textTimer); showResult(); }
  }
  requestAnimationFrame(tick);
}

function showResult() {
  // 找出现次数最多的字母（并列时按 A>B>C>D 顺序）
  let max = -1, win = 0;
  counts.forEach((c, i) => { if (c > max) { max = c; win = i; } });
  const result = CONFIG.results[win];

  document.getElementById('resType').textContent = result.type;
  document.getElementById('resTagline').textContent = result.tagline;
  document.getElementById('kwRow').innerHTML =
    result.keywords.map(k => `<span class="kw">${k}</span>`).join('');

  // 选择分布
  const distRows = counts.map((c, i) => {
    const pct = Math.round(c / TOTAL * 100);
    return `<div class="dist-row ${i===win?'win':''}">
      <div class="dist-lab">${LABELS[i]} · ${CONFIG.results[i].type}</div>
      <div class="dist-bar"><i data-w="${pct}"></i></div>
      <div class="dist-num">${c}</div>
    </div>`;
  }).join('');
  document.getElementById('distRows').innerHTML = distRows;

  document.getElementById('sections').innerHTML = result.sections.map(s => `
    <div class="sec">
      <div class="sec-title">${s.title}</div>
      <div class="sec-text">${s.text}</div>
    </div>`).join('');

  show('pageResult');
  window.scrollTo({ top: 0, behavior: 'auto' });
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.getElementById('pageResult').classList.add('vis');
      document.querySelectorAll('.dist-bar i').forEach(b => b.style.width = b.dataset.w + '%');
    }, 40);
  });
}

function restart() {
  document.getElementById('pageResult').classList.remove('vis');
  show('pageCover');
  window.scrollTo({ top: 0, behavior: 'auto' });
}
</script>
